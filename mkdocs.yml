site_name: EGR 314 Nichols Datasheet
site_url: https://embedded-systems-design.github.io/EGR314DataSheetTemplate
repo_url: https://github.com/embedded-systems-design/EGR314DataSheetTemplate
edit_uri: edit/main/docs/
theme:
  name: material
  custom_dir: custom_theme/
  palette:
    primary: blue
    accent: indigo
  font:
    text: Roboto
  logo: static/logo314.svg
  favicon: static/logo314.png

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tabs.overflow
    - toc.follow    
    - navigation.top
    - navigation.path
    - navigation.indexes
    - navigation.prune
    - content.action.edit
    - navigation.footer
  #  - navigation.sections
    - navigation.expand
  # - navigation.instant # doesn't work that well

markdown_extensions:
  - attr_list #add attributes using curly brackets to images, see https://squidfunk.github.io/mkdocs-material/reference/images/
  - md_in_html # see https://squidfunk.github.io/mkdocs-material/reference/images/
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tilde: {}
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

draft_docs: |
  **/*_unpublished.md
  **/*_draft.md
  **/*_draft**
  
plugins:
  - search
  - glightbox # allow resize images, see https://squidfunk.github.io/mkdocs-material/reference/images/

extra_css:
  - stylesheets/extra.css  

extra_javascript:
 - javascripts/mathjax.js
 - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
    
not_in_nav: |
  static
  
copyright: "Copyright &copy; 2026 team-name-here"

extra:
  generator: false
  social:
    - icon: fontawesome/regular/file-code
      link: /2026_spring
      name: 2023 Site

nav:
  - Home: index.md
  - Block Diagram: 01-Block-Diagram/Block-Diagram.md
  - Component Selection: 02-Component-Selection/Component-Selection.md
  - BOM: 03-BOM/BOM.md
  - Schematic: 04-Schematic/schematic.md
  - Power Budget: 05-Power-Budget/Power-Budget.md
  - Test Scrolbar 1: 06-Test-Scrollbar-1/test1.md
  - Test Scrolbar 2: 07-test-scrollbar-2/test2.md
  - Test Scrolbar 3: 08-test-scrollbar-3/testing.md
  - Test Scrolbar 4: 09-test-scrollbar-4/testing.md
  - Test Scrolbar 5: 10-test-scrollbar-5/testing.md
  - Appendix:
      - Overview: Appendix/index.md
      - Apen-1: Appendix/another-subfile.md
      - Apen-2: Appendix/charts.md
      - Apen-3: Appendix/esp-32-table.md
      - Apen-4: Appendix/basic-markdown-examples.md
